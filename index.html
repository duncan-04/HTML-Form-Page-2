<!DOCTYPE html>
<html lang="en"
<head>
<meta charset="UTF-8">
<title>Job Application Form</title>

<link rel="stylesheet" href="styles.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="script.js"></script>

</head>

<body>

<div class="container">

<h2 class="title">Job Application Form</h2>

<form onsubmit="return validateForm()">

<!-- PERSONAL INFORMATION -->

<fieldset>
<legend>Personal Information</legend>

<label for="fullname">Full Name</label>
<input type="text" id="fullname" class="form-control">

<label for="email">Email</label>
<input type="email" id="telephone" class="form-control">

<label for="telephone">Telephone</label>
<input type="tel" id="telephone" class="form-control">

<label for="address">Address</label>
<textarea id="address" class="form-control"></textarea>

</fieldset>

<!-- POSITION INFORMATION -->

<fieldset>
<legend>Position Information</legend>

<label for="job">Desired Job Title</label>

<select id="job" class="form-control">
<option value="">Select Job</option>
<option>Software Developer</option>
<option>Web Designer</option>
<option>Data Analyst</option>
<option>Network Engineer</option>
</select>

</fieldset>

<!-- EMPLOYMENT TYPE -->

<fieldset>
<legend>Employment Type</legend>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Full-time Permanent</label>
</div>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Contract Contract</label>
</div>

<div class="form-check">
<input type="radio" name="employment" class="form-check-input">
<label class="form-check-label">Internship Permanent</label>
</div>

  </fieldset>

  <!-- AREA OF INTEREST -->

  <fieldset>
  <legend>Area of Interest</legend>

  <div class="form-check">
  <input type="checkbox" class="interest form-check-input">
  <label class="form-check-label">Account Executive</label>
  </div>

<div class="form-check">
<input type="checkbox" class="interest form-check-input">
<label class="form-check-label">Business Development</label>
</div>

  <div class="form-check">
  <input type="checkbox" class="interest form-check-input">
  <label class="form-check-label">Inside Sales</label>
  </div>

<div class="form-check">
<input type="checkbox" class="interest form-check-input">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input type="checkbox" class="interest form-check-input">
<label class="form-check-label">VP Sales</label>
  </div>

  </fieldset>

<!-- RELOCATION -->

<fieldset>
<legend>Relocation</legend>

<div class="form-check">
<input type="radio" name="relocate" class=form-check-input">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input type="radio" name="relocate" class="form-check-input">
<label class="form-check-label">No</label>
</div>

</fieldset>

<!-- MESSAGE -->

<fieldset>
<legend>Additional Message</legend>

<textarea class="form-control" rows="4"></textarea>

</fieldset>

<br>

<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-danger">Reset</button>

</form>

</div>

</body>
</html>
